<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Single theme-color + color-scheme (no media query): the in-app toggle overrides the OS
         preference, so the system UI must follow the app's resolved theme. theme-color drives
         the top status bar; color-scheme drives the bottom Android navigation bar in a standalone
         PWA. The pre-paint script sets both; useTheme keeps them in sync on toggle. -->
    <meta name="theme-color" content="#09090b" />
    <meta name="color-scheme" content="dark" />

    <title>Multimeter — Bluetooth DMM logger in your browser (UNI-T UT60BT)</title>
    <meta
      name="description"
      content="Turn a Bluetooth multimeter into a live full-screen readout with charting, statistics, recording, and CSV/PNG export. Runs entirely in your browser — no install, no account. Supports the UNI-T UT60BT."
    />
    <meta name="application-name" content="Multimeter" />
    <meta name="apple-mobile-web-app-title" content="Multimeter" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://mbtech-nl.github.io/multimeter/" />

    <!-- Open Graph / link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Multimeter — Bluetooth DMM logger" />
    <meta property="og:title" content="Multimeter — Bluetooth DMM logger in your browser" />
    <meta
      property="og:description"
      content="Live readout, charting, recording, and CSV/PNG export for Bluetooth multimeters (UNI-T UT60BT). No install, runs from a URL."
    />
    <meta property="og:url" content="https://mbtech-nl.github.io/multimeter/" />
    <meta property="og:image" content="https://mbtech-nl.github.io/multimeter/pwa-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Multimeter — Bluetooth DMM logger in your browser" />
    <meta
      name="twitter:description"
      content="Live readout, charting, recording, and CSV/PNG export for Bluetooth multimeters (UNI-T UT60BT)."
    />
    <meta name="twitter:image" content="https://mbtech-nl.github.io/multimeter/pwa-512x512.png" />
    <!-- Resolve the theme before first paint so there's no light/dark flash. Saved choice
         wins; otherwise follow the OS. App's useTheme reads this class back as its initial
         state, so React stays in sync. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'dark' ? '#09090b' : '#fafafa');
          var cs = document.querySelector('meta[name="color-scheme"]');
          if (cs) cs.setAttribute('content', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>Multimeter — Bluetooth DMM logger</h1>
      <p>
        A browser companion for Bluetooth multimeters (UNI-T UT60BT): a live full-screen readout,
        charting, statistics, recording, and CSV/PNG export — no install, runs from a URL. It needs
        JavaScript and a Chromium browser (Chrome, Edge, Brave, Opera) with Web Bluetooth.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
